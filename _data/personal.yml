  body: |
   <h3>Harry <strong>Reyes Nieva</strong>, PhD, MAS</h3>
    
     Welcome! I'm a postdoctoral research scientist with expertise in artificial intelligence (AI) and informatics in medicine and public health. My research appointment is in the [Division of Infectious Diseases](https://www.infectiousdiseases.cuimc.columbia.edu/){:target="_blank"} at [Columbia University Irving Medical Center](https://www.cuimc.columbia.edu/){:target="_blank"}. I'm also a member of the [Columbia Herbert Irving Comprehensive Cancer Center (HCCC)](https://www.cancer.columbia.edu/education/trainee-associate-member-program){:target="_blank"}. My overarching goal is to realize the tremendous promise of AI for scientific discovery and healthcare innovation while minimizing its potential perils. 
    
    I develop computational techniques with applications to infectious diseases, which demand technical solutions that are robust and deployable, often operating under uncertainty, shifting epidemiology, and constrained resources. I design <b>intelligent systems</b> and data platforms, build robust <b>ML models</b>, create open <b>knowledge bases</b> for reuse, and develop <b>high-throughput computational techniques</b> that extract and synthesize evidence from large, heterogeneous data sources. Methodologically, my research combines machine learning (ML), natural language processing, and knowledge engineering with traditional biostatistics and epidemiology. In particular, I focus on several domains:
    1. Leveraging AI & informatics to advance precision health for all populations
    2. Strengthening next-generation learning health systems in the era of AI
    3. Evidence extraction, synthesis, and curation in open knowledge bases
    3. Evidence generation across distributed data networks
    4. Interrogating ethical, legal, and social implications for human-centered AI
    
    I completed my PhD in the [Department of Biomedical Informatics](https://www.dbmi.columbia.edu/){:target="_blank"} at Columbia University where I was advised by Noémie Elhadad. For most of my PhD, I was also a Visiting Postgraduate Research Fellow in the Department of Medicine at [Harvard Medical School](https://hms.harvard.edu/){:target="_blank"}. In addition to degrees in biomedical informatics, I have a Master of Applied Science from the [Johns Hopkins Bloomberg School of Public Health](https://publichealth.jhu.edu){:target="_blank"} in Spatial Analysis and a Bachelor of Arts from [Yale University](https://www.yale.edu/){:target="_blank"} in History and Sociology.