  body: |
   <h3>Harry <strong>Reyes Nieva</strong>, PhD, MAS</h3>
    
     Welcome! I'm a postdoctoral research scientist with expertise in artificial intelligence (AI) and informatics in medicine and public health. My research appointment is in the [Division of Infectious Diseases](https://www.infectiousdiseases.cuimc.columbia.edu/){:target="_blank"} at [Columbia University Irving Medical Center](https://www.cuimc.columbia.edu/){:target="_blank"}. I'm also a member of the [Columbia Herbert Irving Comprehensive Cancer Center (HCCC)](https://www.cancer.columbia.edu/education/trainee-associate-member-program){:target="_blank"}. I completed my PhD with Noémie Elhadad, PhD in the [Department of Biomedical Informatics](https://www.dbmi.columbia.edu/){:target="_blank"} at Columbia while concurrently a Visiting Postgraduate Research Fellow in the Department of Medicine at [Harvard Medical School](https://hms.harvard.edu/){:target="_blank"}.
    
    Infectious diseases remain among the most urgent threats to human health and yet the systems we rely on to track and address them are brittle, slow, and built for an earlier era. Meanwhile, health providers and researchers sit on vast, underutilized data assets. Advances in informatics and AI make it possible to translate disparate data streams into adaptive, auditable reasoning systems. 
    
    I develop computational techniques with applications to infectious diseases, which demand technical solutions that are robust and deployable, often operating under uncertainty, shifting epidemiology, and constrained resources. I design intelligent systems and data platforms, build robust machine learning models, create open knowledge bases for reuse, and develop high-throughput computational techniques that extract and synthesize evidence from large, heterogeneous data sources. Methodologically, my research combines machine learning (ML), natural language processing (NLP), spatiotemporal modeling, and knowledge engineering with traditional biostatistics and epidemiology. 
    
    My research is informed by a decade and a half of prior domestic and international experience in applied clinical and public health informatics, health services research, health systems strengthening, and humanitarian efforts including roles in strategic information for the U.S. President’s Emergency Plan for AIDS Relief (PEPFAR) program at Harvard University and a three-year term appointment as a Commissioner for Human Rights. 
    
    My research focuses on several domains:
    1. Leveraging AI & informatics to advance precision health for all populations
    2. Strengthening next-generation learning health systems in the era of AI
    3. Evidence extraction, synthesis, and curation in open knowledge bases
    3. Evidence generation across distributed data networks
    4. Interrogating ethical, legal, and social implications for human-centered AI
    
    My PhD was funded by training fellowships from the [National Library of Medicine](https://www.nlm.nih.gov/){:target="blank"} and [National Institute of Allergy and Infectious Diseases](https://www.niaid.nih.gov/){:target="_blank"}. I am also the recipient of a [Computational and Data Science Fellowship](https://www.sighpc.org/for-your-career/fellowships/2021-fellowship-winners){:target="_blank"} from the [Association for Computing Machinery](https://www.acm.org/){:target="_blank"} (ACM) [Special Interest Group in High Performance Computing](https://www.sighpc.org/home){:target="_blank"} (SIGHPC). In addition to my degrees in biomedical informatics, I also have a Master of Applied Science in Spatial Analysis from the [Johns Hopkins Bloomberg School of Public Health](https://publichealth.jhu.edu){:target="_blank"} and a Bachelor of Arts in Sociology and History from [Yale University](https://www.yale.edu/){:target="_blank"}.